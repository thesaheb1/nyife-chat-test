x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file:
    - .env
  networks:
    - nyife-network

x-backend-env: &backend-env
  NODE_ENV: development
  MYSQL_HOST: mysql
  MYSQL_PORT: 3306
  MYSQL_USER: ${MYSQL_USER:-nyife_user}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nyife_pass}
  MYSQL_DATABASE: ${MYSQL_DATABASE:-nyife_db}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  KAFKA_BROKERS: kafka:29092
  SUBSCRIPTION_SERVICE_URL: http://subscription-service:3003

x-node-service-build: &node-service-build
  context: .
  dockerfile: docker/Dockerfile.node-service

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-nyife_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nyife_db}
      MYSQL_USER: ${MYSQL_USER:-nyife_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nyife_pass}
    ports:
      - "${MYSQL_DOCKER_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nyife-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_DOCKER_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ];
      then redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else redis-server --appendonly yes;
      fi'
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nyife-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    ports:
      - "${ZOOKEEPER_DOCKER_PORT:-2181}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - nyife-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "${KAFKA_DOCKER_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - nyife-network

  api-gateway:
    <<: *service-defaults
    build:
      <<: *node-service-build
      args:
        SERVICE_NAME: api-gateway
        SERVICE_PORT: 3000
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      API_GATEWAY_PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret_change}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      SUBSCRIPTION_SERVICE_URL: http://subscription-service:3003
      WALLET_SERVICE_URL: http://wallet-service:3004
      CONTACT_SERVICE_URL: http://contact-service:3005
      TEMPLATE_SERVICE_URL: http://template-service:3006
      CAMPAIGN_SERVICE_URL: http://campaign-service:3007
      CHAT_SERVICE_URL: http://chat-service:3008
      WHATSAPP_SERVICE_URL: http://whatsapp-service:3009
      AUTOMATION_SERVICE_URL: http://automation-service:3010
      ORGANIZATION_SERVICE_URL: http://organization-service:3011
      NOTIFICATION_SERVICE_URL: http://notification-service:3012
      EMAIL_SERVICE_URL: http://email-service:3013
      SUPPORT_SERVICE_URL: http://support-service:3014
      ADMIN_SERVICE_URL: http://admin-service:3015
      ANALYTICS_SERVICE_URL: http://analytics-service:3016
      MEDIA_SERVICE_URL: http://media-service:3017
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  auth-service:
    <<: *service-defaults
    build:
      <<: *node-service-build
      args:
        SERVICE_NAME: auth-service
        SERVICE_PORT: 3001
    ports:
      - "${AUTH_SERVICE_PORT:-3001}:3001"
    environment:
      <<: *backend-env
      AUTH_SERVICE_PORT: 3001
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  user-service:
