    environment:
      NODE_ENV: production
      AUTH_SERVICE_PORT: 3001
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:29092
    depends_on:
      mysql:
        condition: service_healthy
      redis:
